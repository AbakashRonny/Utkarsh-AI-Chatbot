<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1">
        <animate attributeName="stop-color" values="#6366f1;#a855f7;#6366f1" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#6366f1;#a855f7" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Brain/Node Icon -->
  <g filter="url(#glow)">
    <!-- Central Node -->
    <circle cx="100" cy="100" r="25" fill="url(#logo-gradient)">
      <animate attributeName="r" values="25;28;25" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Outer Rings -->
    <circle cx="100" cy="100" r="45" stroke="url(#logo-gradient)" stroke-width="2" stroke-dasharray="10 5" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="100" cy="100" r="65" stroke="url(#logo-gradient)" stroke-width="1" stroke-dasharray="5 15" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite" />
    </circle>
    
    <!-- Neural Connections -->
    <path d="M100 40 L100 75 M100 125 L100 160 M40 100 L75 100 M125 100 L160 100" stroke="url(#logo-gradient)" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite" />
    </path>
    <circle cx="100" cy="40" r="5" fill="url(#logo-gradient)" />
    <circle cx="100" cy="160" r="5" fill="url(#logo-gradient)" />
    <circle cx="40" cy="100" r="5" fill="url(#logo-gradient)" />
    <circle cx="160" cy="100" r="5" fill="url(#logo-gradient)" />
  </g>
</svg>
